<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微博存档 - 成涛微博</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f6f7; color: #333; line-height: 1.6; }
.header { background: linear-gradient(135deg, #ff8200, #ff5722); color: #fff; padding: 24px; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size: 22px; font-weight: 600; }
.header .stats { font-size: 13px; opacity: .85; margin-top: 4px; }
.controls { max-width: 700px; margin: 16px auto; padding: 0 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.controls input, .controls select { flex: 1; min-width: 120px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.controls input:focus, .controls select:focus { border-color: #ff8200; }
.container { max-width: 700px; margin: 0 auto; padding: 0 12px 40px; }
.post { background: #fff; border-radius: 12px; padding: 18px; margin-top: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.post-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #999; margin-bottom: 8px; }
.post-meta .date { font-weight: 500; }
.post-meta .source { }
.post-text { font-size: 15px; white-space: pre-wrap; word-break: break-word; }
.post-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.post-images img { max-width: 200px; max-height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform .2s; }
.post-images img:hover { transform: scale(1.03); }
.repost { background: #f8f8f8; border-left: 3px solid #ff8200; border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: 14px; }
.repost .repost-user { font-weight: 600; color: #ff5722; margin-bottom: 4px; }
.post-stats { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: #999; }
.post-stats span::before { margin-right: 3px; }
.comments { margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
.comments-toggle { cursor: pointer; font-size: 13px; color: #ff8200; font-weight: 500; padding: 4px 0; list-style: none; }
.comments-toggle::-webkit-details-marker { display: none; }
.comments-toggle::before { content: '▶ '; font-size: 10px; }
details[open] > .comments-toggle::before { content: '▼ '; }
.comment { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.comment:last-child { border-bottom: none; }
.comment .comment-user { font-weight: 600; color: #ff5722; }
.comment .comment-date { font-size: 11px; color: #bbb; margin-left: 8px; }
.region { font-size: 12px; color: #aaa; margin-top: 4px; }
.load-more { display: block; margin: 20px auto; padding: 10px 32px; background: #ff8200; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.load-more:hover { background: #e67300; }
.no-results { text-align: center; padding: 40px; color: #999; font-size: 15px; }
.year-divider { text-align: center; margin-top: 20px; font-size: 18px; font-weight: 700; color: #ff8200; }
/* lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; justify-content: center; align-items: center; cursor: pointer; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
</style>
</head>
<body>
<div class="header">
  <h1 id="title">微博存档</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="搜索微博内容...">
  <select id="yearFilter"><option value="">全部年份</option></select>
  <select id="typeFilter">
    <option value="">全部类型</option>
    <option value="original">原创</option>
    <option value="repost">转发</option>
    <option value="with_images">有图片</option>
    <option value="with_comments">有评论</option>
  </select>
</div>
<div class="container" id="container"></div>
<div class="lightbox" id="lightbox"><img id="lightbox-img"></div>

<script>
let DATA, filtered, PAGE_SIZE = 50, shown = 0;

function parseDate(s) { return new Date(s); }
function fmtDate(s) {
  const d = parseDate(s);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function esc(t) { const e = document.createElement('span'); e.textContent = t; return e.innerHTML; }

function renderPost(p) {
  const year = parseDate(p.created_at).getFullYear();
  let h = `<div class="post-meta"><span class="date">${fmtDate(p.created_at)}</span><span class="source">${esc(p.source||'')}</span></div>`;
  h += `<div class="post-text">${esc(p.text)}</div>`;
  if (p.pic_urls && p.pic_urls.length) {
    h += `<div class="post-images">${p.pic_urls.map(u=>`<img src="${esc(u)}" loading="lazy" onclick="openLightbox('${esc(u)}')">`).join('')}</div>`;
  }
  if (p.repost) {
    h += `<div class="repost"><div class="repost-user">@${esc(p.repost.user)}</div><div>${esc(p.repost.text||'')}</div></div>`;
  }
  if (p.region_name) h += `<div class="region">${esc(p.region_name)}</div>`;
  const stats = [];
  if (p.reposts_count) stats.push(`转发 ${p.reposts_count}`);
  if (p.comments_count) stats.push(`评论 ${p.comments_count}`);
  if (p.attitudes_count) stats.push(`点赞 ${p.attitudes_count}`);
  if (stats.length) h += `<div class="post-stats">${stats.map(s=>`<span>${s}</span>`).join('')}</div>`;
  if (p.comments && p.comments.length) {
    h += `<details class="comments"><summary class="comments-toggle">评论 (${p.comments.length})</summary>${p.comments.map(c=>`<div class="comment"><span class="comment-user">@${esc(c.user)}</span><span class="comment-date">${fmtDate(c.created_at)}</span><br>${esc(c.text)}</div>`).join('')}</details>`;
  }
  return `<div class="post" data-year="${year}">${h}</div>`;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const yr = document.getElementById('yearFilter').value;
  const tp = document.getElementById('typeFilter').value;
  filtered = DATA.posts.filter(p => {
    if (q && !p.text.toLowerCase().includes(q) && !(p.repost && p.repost.text && p.repost.text.toLowerCase().includes(q))) return false;
    if (yr && parseDate(p.created_at).getFullYear() != yr) return false;
    if (tp === 'original' && p.repost) return false;
    if (tp === 'repost' && !p.repost) return false;
    if (tp === 'with_images' && (!p.pic_urls || !p.pic_urls.length)) return false;
    if (tp === 'with_comments' && (!p.comments || !p.comments.length)) return false;
    return true;
  });
  shown = 0;
  document.getElementById('container').innerHTML = '';
  renderPage();
}

function renderPage() {
  const c = document.getElementById('container');
  if (!filtered.length) { c.innerHTML = '<div class="no-results">没有找到微博</div>'; return; }
  let lastYear = null;
  const existing = c.querySelectorAll('.post');
  if (existing.length) lastYear = existing[existing.length-1].dataset.year;
  const slice = filtered.slice(shown, shown + PAGE_SIZE);
  let html = '';
  for (const p of slice) {
    const y = parseDate(p.created_at).getFullYear();
    if (String(y) !== String(lastYear)) { html += `<div class="year-divider">${y}</div>`; lastYear = y; }
    html += renderPost(p);
  }
  shown += slice.length;
  // remove old button
  const old = c.querySelector('.load-more');
  if (old) old.remove();
  c.insertAdjacentHTML('beforeend', html);
  if (shown < filtered.length) c.insertAdjacentHTML('beforeend', `<button class="load-more" onclick="renderPage()">加载更多 (${shown}/${filtered.length})</button>`);
  document.getElementById('stats').textContent = `共 ${filtered.length} 条微博`;
}

window.openLightbox = function(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('active');
};
document.getElementById('lightbox').onclick = function() { this.classList.remove('active'); };

let debounce;
document.getElementById('search').addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(applyFilters, 300); });
document.getElementById('yearFilter').addEventListener('change', applyFilters);
document.getElementById('typeFilter').addEventListener('change', applyFilters);

fetch('weibo_2201640147_export.json').then(r=>r.json()).then(d => {
  DATA = d;
  document.getElementById('title').textContent = `${d.user.screen_name} 的微博存档`;
  // populate year filter
  const years = [...new Set(d.posts.map(p => parseDate(p.created_at).getFullYear()))].sort((a,b)=>b-a);
  const sel = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y + '年'; sel.appendChild(o); });
  applyFilters();
});
</script>
</body>
</html>
